# ~3B params
model:
  vocab_size: 32000
  hidden_size: 2560
  intermediate_size: 6912
  num_hidden_layers: 32
  num_attention_heads: 32
  num_key_value_heads: 8
  max_position_embeddings: 2048
  rope_theta: 10000.0
  rms_norm_eps: 1e-6
  tie_word_embeddings: true
  use_token_routed_mlp: true
  num_experts: 8
  use_qk_norm: true
  use_sdpa: true
  dynamics_dt: 0.1
  dynamics_controller_hidden: 64
